version: '3.8'
services:
  mongodb:
    image: mongo:6.0
    container_name: contacts_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  mongo-express:
    image: mongo-express:latest
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
    ports:
      - '8081:8081'
    depends_on:
      - mongodb

volumes:
  mongo-data:
